<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3D33C4"/>
      <stop offset="55%" stop-color="#6C63FF"/>
      <stop offset="100%" stop-color="#A89BFF"/>
    </linearGradient>
    <linearGradient id="docGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#EAE7FF"/>
    </linearGradient>
    <linearGradient id="lockGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#D0CAFF"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="10%" r="60%">
      <stop offset="0%" stop-color="white" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-25%" y="-20%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="18"/>
      <feOffset dx="0" dy="14"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.28"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="lockShadow" x="-40%" y="-40%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <rect width="1024" height="1024" fill="url(#glow)"/>

  <!-- Specular highlight top -->
  <ellipse cx="512" cy="80" rx="300" ry="70" fill="white" fill-opacity="0.07"/>

  <!-- Document -->
  <g transform="rotate(-5, 512, 490)" filter="url(#shadow)">
    <!-- Page body -->
    <rect x="295" y="230" width="390" height="490" rx="28" fill="url(#docGrad)"/>

    <!-- Folded corner top-right -->
    <path d="M613 230 L685 302 L613 302 Z" fill="#C8C2FF" fill-opacity="0.6"/>
    <path d="M613 230 L685 302 L613 302 Z" fill="none" stroke="#B0A8FF" stroke-width="1"/>
    <path d="M613 230 L685 302" fill="none" stroke="#A89BFF" stroke-width="1.5" stroke-opacity="0.5"/>

    <!-- # symbol — bold, stylized, violet -->
    <text x="490" y="490" font-family="SF Pro Display, Helvetica Neue, Arial, sans-serif"
          font-size="210" font-weight="800" fill="#6C63FF" fill-opacity="0.88"
          text-anchor="middle" dominant-baseline="middle">#</text>

    <!-- Content lines -->
    <rect x="355" y="570" width="220" height="14" rx="7" fill="#6C63FF" fill-opacity="0.18"/>
    <rect x="355" y="600" width="160" height="14" rx="7" fill="#6C63FF" fill-opacity="0.12"/>
    <rect x="355" y="630" width="190" height="14" rx="7" fill="#6C63FF" fill-opacity="0.10"/>
  </g>

  <!-- Padlock — overlapping bottom-right of document -->
  <g transform="translate(596, 582)" filter="url(#lockShadow)">
    <!-- Shackle -->
    <path d="M30 52 V30 A36 36 0 0 1 102 30 V52" fill="none" stroke="url(#lockGrad)" stroke-width="20" stroke-linecap="round"/>
    <!-- Body -->
    <rect x="8" y="52" width="116" height="94" rx="22" fill="url(#lockGrad)"/>
    <!-- Keyhole -->
    <circle cx="66" cy="93" r="14" fill="#7B6FFF"/>
    <rect x="60" y="93" width="12" height="20" rx="6" fill="#7B6FFF"/>
  </g>
</svg>
