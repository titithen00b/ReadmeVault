name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Créer une release
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build Release
        run: |
          xcodebuild \
            -project ReadmeVault.xcodeproj \
            -scheme ReadmeVault \
            -configuration Release \
            -destination 'platform=macOS' \
            -archivePath build/ReadmeVault.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            archive

      - name: Créer le .app macOS
        run: |
          cd build/ReadmeVault.xcarchive/Products/Applications
          zip -r ../../../../ReadmeVault.zip ReadmeVault.app

      - name: Build iOS IPA
        run: |
          xcodebuild \
            -project ReadmeVault.xcodeproj \
            -scheme ReadMeVault \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/ReadMeVault.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            archive
          mkdir -p build/Payload
          cp -r build/ReadMeVault.xcarchive/Products/Applications/ReadMeVault.app build/Payload/
          cd build && zip -r ../ReadMeVault.ipa Payload/

      - name: Générer les notes de version
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${{ github.ref_name }}$" | head -1)
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s" HEAD)
          else
            COMMITS=$(git log --pretty=format:"- %s" ${PREV_TAG}..HEAD)
          fi
          echo "commits<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Publier la release GitHub
        uses: softprops/action-gh-release@v2
        with:
          name: ReadmeVault ${{ github.ref_name }}
          body: |
            ## Nouveautés

            ${{ steps.changelog.outputs.commits }}

            ---

            ### Installation macOS
            1. Télécharge `ReadmeVault.zip`
            2. Décompresse et glisse `ReadmeVault.app` dans `/Applications`
            3. Clic droit → **Ouvrir** (première fois, pour bypasser Gatekeeper)

            ### Installation iOS (AltStore / SideStore)
            1. Télécharge `ReadMeVault.ipa`
            2. Installe via AltStore ou SideStore
          files: |
            ReadmeVault.zip
            ReadMeVault.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
