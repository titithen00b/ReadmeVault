name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Créer une release
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sélection Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Build Release
        run: |
          xcodebuild \
            -project ReadmeVault.xcodeproj \
            -scheme ReadmeVault \
            -configuration Release \
            -destination 'platform=macOS' \
            -archivePath build/ReadmeVault.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            archive

      - name: Créer le .app
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath build/ReadmeVault.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist ExportOptions.plist || true
          cd build/ReadmeVault.xcarchive/Products/Applications
          zip -r ../../../../ReadmeVault.zip ReadmeVault.app

      - name: Générer les notes de version
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${{ github.ref_name }}$" | head -1)
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s" HEAD)
          else
            COMMITS=$(git log --pretty=format:"- %s" ${PREV_TAG}..HEAD)
          fi
          echo "commits<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Publier la release GitHub
        uses: softprops/action-gh-release@v2
        with:
          name: ReadmeVault ${{ github.ref_name }}
          body: |
            ## Nouveautés

            ${{ steps.changelog.outputs.commits }}

            ---

            ### Installation
            1. Télécharge `ReadmeVault.zip`
            2. Décompresse et glisse `ReadmeVault.app` dans `/Applications`
            3. Clic droit → **Ouvrir** (première fois, pour bypasser Gatekeeper)
          files: ReadmeVault.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
